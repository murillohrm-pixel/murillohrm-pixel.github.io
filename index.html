<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Manutenções - Defensoria</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body {
  font-family: Arial;
  margin: 20px;
  background: #f4f6f8;
}

h2 {
  text-align: center;
}

.container {
  display: flex;
  gap: 20px;
}

.esquerda { width: 50%; }
.direita { width: 50%; }

/* FILTROS */
.filtros {
  display: flex;
  gap: 20px;
  margin-bottom: 15px;
}

.filtros div {
  display: flex;
  flex-direction: column;
}

select {
  padding: 8px;
}

/* MAPA */
#map {
  height: 500px;
  background: #ddd;
  border-radius: 10px;
}

/* TABELA */
table {
  width: 100%;
  border-collapse: collapse;
  background: white;
}

th {
  background: #2c3e50;
  color: white;
  padding: 10px;
}

td {
  padding: 8px;
  border-bottom: 1px solid #ddd;
}

/* TOOLTIP */
.leaflet-tooltip {
  background: rgba(255, 255, 255, 0.7);
  border: none;
  box-shadow: none;
  border-radius: 4px;
  padding: 2px 4px;
  font-size: 10px;
  color: #222;
}
</style>
</head>

<body>

<h2>Manutenções por Unidade</h2>

<div class="container">

  <!-- ESQUERDA -->
  <div class="esquerda">

    <div class="filtros">

      <div>
        <label>Unidade</label>
        <select id="unidadeSelect">
          <option value="">Todas</option>
        </select>
      </div>

      <div>
        <label>Ano</label>
        <select id="anoSelect">
          <option value="">Todos</option>
        </select>
      </div>

    </div>

    <div id="map"></div>

  </div>

  <!-- DIREITA -->
  <div class="direita">
    <table>
      <thead>
        <tr>
          <th>Data</th>
          <th>Andar</th>
          <th>Sala</th>
          <th>Descrição</th>
          <th>Ano</th>
        </tr>
      </thead>
      <tbody id="tabela"></tbody>
    </table>
  </div>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
let manutencoes = [];
let unidades = [];
let mapa;
let unidadeSelecionada = "";

// 🔥 CARREGAR DADOS
Promise.all([
  fetch('manutencoes.json').then(r => r.json()),
  fetch('unidades.json').then(r => r.json())
])
.then(([m, u]) => {
  manutencoes = m;
  unidades = u;

  carregarFiltros();
  iniciarMapa();
});

// 🔹 EXTRAI MUNICÍPIO
function extrairMunicipio(nome) {
  const partes = nome.split("DE ");

  if (partes.length > 1) {
    return partes[1].split(" -")[0];
  }

  return nome;
}

// 🔹 EXTRAI ANO
function extrairAno(texto) {
  const match = texto.match(/\d{4}/);
  return match ? match[0] : "";
}

// 🔹 FILTROS
function carregarFiltros() {
  const unidadeSelect = document.getElementById('unidadeSelect');
  const anoSelect = document.getElementById('anoSelect');

  const unidadesUnicas = [...new Set(manutencoes.map(d => d.unidade))];

  const anos = [...new Set(
    manutencoes.map(d => extrairAno(d.ano_origem))
  )];

  unidadesUnicas.forEach(u => {
    const opt = document.createElement('option');
    opt.value = u;
    opt.textContent = u;
    unidadeSelect.appendChild(opt);
  });

  anos.forEach(a => {
    if (!a) return;
    const opt = document.createElement('option');
    opt.value = a;
    opt.textContent = a;
    anoSelect.appendChild(opt);
  });
}

// 🔹 EVENTOS
document.getElementById('unidadeSelect').addEventListener('change', () => {
  unidadeSelecionada = document.getElementById('unidadeSelect').value;
  filtrar();
});

document.getElementById('anoSelect').addEventListener('change', filtrar);

// 🔹 FILTRAR
function filtrar() {
  const ano = document.getElementById('anoSelect').value;

  let lista = manutencoes;

  if (unidadeSelecionada) {
    lista = lista.filter(d => d.unidade === unidadeSelecionada);
  }

  if (ano) {
    lista = lista.filter(d => extrairAno(d.ano_origem) === ano);
  }

  renderTabela(lista);
}

// 🔹 TABELA
function renderTabela(lista) {
  const tabela = document.getElementById('tabela');
  tabela.innerHTML = '';

  lista.forEach(item => {
    tabela.innerHTML += `
      <tr>
        <td>${item.data || '-'}</td>
        <td>${item.andar || '-'}</td>
        <td>${item.sala || '-'}</td>
        <td>${item.descricao || '-'}</td>
        <td>${extrairAno(item.ano_origem)}</td>
      </tr>
    `;
  });
}

// 🔥 MAPA
function iniciarMapa() {

  mapa = L.map('map');

  const bounds = [];

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap'
  }).addTo(mapa);

  unidades.forEach(u => {

    const lat = Number(u.latitude);
    const lng = Number(u.longitude);

    if (!lat || !lng) return;

    const marker = L.marker([lat, lng]).addTo(mapa);

    bounds.push([lat, lng]);

    const municipio = extrairMunicipio(u.unidade);

    marker.bindTooltip(municipio, {
      permanent: true,
      direction: 'right',
      offset: [3, 0],
      opacity: 0.8
    });

    marker.bindPopup(`
      <b>${u.unidade}</b><br><br>
      <button onclick="abrirManutencao('${u.unidade}')">
        Manutenção
      </button>
    `);
  });

  if (bounds.length > 0) {
    mapa.fitBounds(bounds, { padding: [50, 50] });
  } else {
    mapa.setView([-20.5, -54.5], 7);
  }
}

// 🔹 CLIQUE NO MAPA
function abrirManutencao(unidade) {
  unidadeSelecionada = unidade;
  document.getElementById('unidadeSelect').value = unidade;
  filtrar();
}
</script>

</body>
</html>

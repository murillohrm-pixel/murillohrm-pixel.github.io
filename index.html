<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Manutenções - Defensoria</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body {
  font-family: Arial;
  margin: 20px;
  background: #f4f6f8;
}

.container {
  display: flex;
  gap: 20px;
}

.esquerda { width: 50%; }
.direita { width: 50%; }

#map {
  height: 500px;
  background: #ddd;
}

select {
  padding: 8px;
}

table {
  width: 100%;
  border-collapse: collapse;
  background: white;
}

th {
  background: #2c3e50;
  color: white;
  padding: 10px;
}

td {
  padding: 8px;
  border-bottom: 1px solid #ddd;
}
</style>
</head>

<body>

<h2>Manutenções por Unidade</h2>

<div class="container">

  <div class="esquerda">
    <select id="unidadeSelect">
      <option value="">Selecione a Unidade</option>
    </select>

    <select id="anoSelect">
      <option value="">Todos os anos</option>
    </select>

    <br><br>
    <div id="map"></div>
  </div>

  <div class="direita">
    <table>
      <thead>
        <tr>
          <th>Data</th>
          <th>Descrição</th>
        </tr>
      </thead>
      <tbody id="tabela"></tbody>
    </table>
  </div>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
let manutencoes = [];
let unidades = [];
let mapa;
let unidadeSelecionada = "";

// 🔥 CARREGAR TUDO JUNTO (IMPORTANTE)
Promise.all([
  fetch('manutencoes.json').then(r => r.json()),
  fetch('unidades.json').then(r => r.json())
])
.then(([m, u]) => {
  console.log("MANUTENCOES:", m.length);
  console.log("UNIDADES:", u.length);

  manutencoes = m;
  unidades = u;

  carregarFiltros();
  iniciarMapa();
})
.catch(err => {
  console.error("ERRO AO CARREGAR JSON:", err);
  alert("Erro ao carregar JSON. Veja o console (F12)");
});

// 🔹 FILTROS
function carregarFiltros() {
  const unidadeSelect = document.getElementById('unidadeSelect');

  const lista = [...new Set(manutencoes.map(d => d.unidade))];

  lista.forEach(u => {
    const opt = document.createElement('option');
    opt.value = u;
    opt.textContent = u;
    unidadeSelect.appendChild(opt);
  });
}

document.getElementById('unidadeSelect').addEventListener('change', () => {
  unidadeSelecionada = document.getElementById('unidadeSelect').value;
  filtrar();
});

// 🔹 FILTRO
function filtrar() {
  let lista = manutencoes;

  if (unidadeSelecionada) {
    lista = lista.filter(d => d.unidade === unidadeSelecionada);
  }

  renderTabela(lista);
}

// 🔹 TABELA
function renderTabela(lista) {
  const tabela = document.getElementById('tabela');
  tabela.innerHTML = '';

  lista.forEach(item => {
    tabela.innerHTML += `
      <tr>
        <td>${item.data}</td>
        <td>${item.descricao}</td>
      </tr>
    `;
  });
}

// 🔥 MAPA (COM DEBUG)
function iniciarMapa() {

  mapa = L.map('map').setView([-20.5, -54.5], 7);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap'
  }).addTo(mapa);

  console.log("Criando marcadores...");

  unidades.forEach((u, i) => {

    console.log("UNIDADE:", u);

    const lat = Number(u.latitude);
    const lng = Number(u.longitude);

    if (!lat || !lng) {
      console.warn("Coordenada inválida:", u);
      return;
    }

    const marker = L.marker([lat, lng]).addTo(mapa);

    marker.bindPopup(`
      <b>${u.unidade}</b><br><br>
      <button onclick="abrirManutencao('${u.unidade}')">
        Manutenção
      </button>
    `);
  });

  console.log("Marcadores criados.");
}

// 🔹 CLIQUE NO MAPA
function abrirManutencao(unidade) {
  unidadeSelecionada = unidade;
  document.getElementById('unidadeSelect').value = unidade;
  filtrar();
}
</script>

</body>
</html>

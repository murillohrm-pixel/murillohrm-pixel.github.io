<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Manutenções - Defensoria</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

<style>
body {
  font-family: Arial;
  margin: 20px;
  background: #f4f6f8;
}

h1 {
  text-align: center;
}

.container {
  display: flex;
  gap: 20px;
}

.esquerda {
  width: 50%;
}

.direita {
  width: 50%;
}

.filtros {
  display: flex;
  gap: 10px;
  margin-bottom: 20px;
}

select {
  padding: 8px;
}

#map {
  height: 500px;
  border-radius: 10px;
}

table {
  width: 100%;
  border-collapse: collapse;
  background: white;
}

th {
  background: #2c3e50;
  color: white;
  padding: 10px;
}

td {
  padding: 8px;
  border-bottom: 1px solid #ddd;
}
</style>
</head>

<body>

<h1>Manutenções por Unidade</h1>

<div class="container">

  <!-- ESQUERDA -->
  <div class="esquerda">

    <div class="filtros">
      <select id="unidadeSelect">
        <option value="">Selecione a Unidade</option>
      </select>

      <select id="anoSelect">
        <option value="">Todos os anos</option>
      </select>
    </div>

    <div id="map"></div>

  </div>

  <!-- DIREITA -->
  <div class="direita">
    <table>
      <thead>
        <tr>
          <th>Data</th>
          <th>Início</th>
          <th>Fim</th>
          <th>Andar</th>
          <th>Sala</th>
          <th>Descrição</th>
        </tr>
      </thead>
      <tbody id="tabela"></tbody>
    </table>
  </div>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
let manutencoes = [];
let unidades = [];
let mapa;
let unidadeSelecionada = "";

// 🔹 MANUTENÇÕES
fetch('manutencoes.json')
  .then(res => res.json())
  .then(json => {
    manutencoes = json;
    carregarFiltros();
  });

// 🔹 UNIDADES (SEU ARQUIVO REAL)
fetch('unidades.json')
  .then(res => res.json())
  .then(json => {
    unidades = json;
    iniciarMapa();
  });

// 🔹 FILTROS
function carregarFiltros() {
  const unidadeSelect = document.getElementById('unidadeSelect');
  const anoSelect = document.getElementById('anoSelect');

  const unidadesUnicas = [...new Set(manutencoes.map(d => d.unidade))];
  const anos = [...new Set(manutencoes.map(d => d.ano_origem))];

  unidadesUnicas.forEach(u => {
    const option = document.createElement('option');
    option.value = u;
    option.textContent = u;
    unidadeSelect.appendChild(option);
  });

  anos.forEach(a => {
    const option = document.createElement('option');
    option.value = a;
    option.textContent = a;
    anoSelect.appendChild(option);
  });
}

// 🔹 EVENTOS
document.getElementById('unidadeSelect').addEventListener('change', () => {
  unidadeSelecionada = document.getElementById('unidadeSelect').value;
  filtrar();
});

document.getElementById('anoSelect').addEventListener('change', filtrar);

// 🔹 FILTRAR
function filtrar() {
  const ano = document.getElementById('anoSelect').value;

  let filtrados = manutencoes;

  if (unidadeSelecionada) {
    filtrados = filtrados.filter(d => d.unidade === unidadeSelecionada);
  }

  if (ano) {
    filtrados = filtrados.filter(d => d.ano_origem === ano);
  }

  renderTabela(filtrados);
}

// 🔹 TABELA
function renderTabela(lista) {
  const tabela = document.getElementById('tabela');
  tabela.innerHTML = '';

  lista.forEach(item => {
    tabela.innerHTML += `
      <tr>
        <td>${item.data}</td>
        <td>${item.hora_inicio || '-'}</td>
        <td>${item.hora_fim || '-'}</td>
        <td>${item.andar}</td>
        <td>${item.sala}</td>
        <td>${item.descricao}</td>
      </tr>
    `;
  });
}

// 🔥 MAPA FUNCIONANDO COM SEU JSON
function iniciarMapa() {
  mapa = L.map('map');

  const bounds = [];

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap'
  }).addTo(mapa);

  unidades.forEach(u => {
    const lat = parseFloat(u.latitude);
    const lng = parseFloat(u.longitude);

    if (isNaN(lat) || isNaN(lng)) return;

    const marker = L.marker([lat, lng]).addTo(mapa);

    bounds.push([lat, lng]);

    marker.bindPopup(`
      <b>${u.unidade}</b><br><br>
      <button onclick="abrirManutencao('${u.unidade}')">
        Manutenção
      </button>
    `);
  });

  // 🔥 Ajusta automaticamente para o estado inteiro
  if (bounds.length > 0) {
    mapa.fitBounds(bounds, { padding: [50, 50] });
  } else {
    mapa.setView([-20.5, -54.5], 7);
  }
}

// 🔹 CLIQUE NO MAPA
function abrirManutencao(unidade) {
  unidadeSelecionada = unidade;

  document.getElementById('unidadeSelect').value = unidade;

  filtrar();
}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Manutenções - Defensoria</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body {
  font-family: Arial;
  margin: 20px;
  background: #f4f6f8;
}

h2 {
  text-align: center;
}

.container {
  display: flex;
  gap: 20px;
}

.esquerda { width: 50%; }
.direita { width: 50%; }

/* FILTROS */
.filtros {
  display: flex;
  gap: 20px;
  margin-bottom: 15px;
}

.filtros div {
  display: flex;
  flex-direction: column;
}

select {
  padding: 8px;
}

/* MAPA */
#map {
  height: 500px;
  background: #ddd;
  border-radius: 10px;
}

/* TABELA */
table {
  width: 100%;
  border-collapse: collapse;
  background: white;
}

th {
  background: #2c3e50;
  color: white;
  padding: 10px;
}

td {
  padding: 8px;
  border-bottom: 1px solid #ddd;
}

/* TOOLTIP */
.leaflet-tooltip {
  background: rgba(255, 255, 255, 0.7);
  border: none;
  box-shadow: none;
  border-radius: 4px;
  padding: 2px 4px;
  font-size: 10px;
  color: #222;
}
.botoes {
  display: flex;
  gap: 10px;
  margin-bottom: 15px;
}

.botoes button {
  padding: 8px 12px;
  border: none;
  background: #2c3e50;
  color: white;
  border-radius: 6px;
  cursor: pointer;
}

.botoes button:hover {
  background: #34495e;
}

.botoes button.ativo {
  background: #2980b9;
}

.resumo-mapa {
  margin-top: 10px;
  padding: 10px;
  background: #ecf0f1;
  border-radius: 8px;
  font-size: 14px;
}

.resumo-tabela {
  margin-top: 15px;
  padding: 10px;
  background: #dfe6e9;
  border-radius: 8px;
  font-size: 14px;
}
</style>
</head>

<body>

<h2>Manutenções por Unidade</h2>

<div class="container">

  <!-- ESQUERDA -->
  <div class="esquerda">

    <div class="filtros">

      <div>
        <label>Unidade</label>
        <select id="unidadeSelect">
          <option value="">Todas</option>
        </select>
      </div>

      <div>
        <label>Ano</label>
        <select id="anoSelect">
          <option value="">Todos</option>
        </select>
      </div>

    </div>

    <div id="map"></div>

    <div id="resumoMapa" class="resumo-mapa"></div>

  </div>

  <!-- DIREITA -->
  <div class="direita">

    <!-- BOTÕES -->
    <div class="botoes">
      <button class="ativo" onclick="mudarModo('manutencao', this)">Manutenção</button>
      <button onclick="mudarModo('obras', this)">Obras</button>
      <button onclick="mudarModo('residuos', this)">Resíduos</button>
    </div>

    <!-- TABELA -->
    <table>
      <thead>
        <tr>
          <th>Município</th>
          <th>Data</th>
          <th>Andar</th>
          <th>Sala</th>
          <th>Descrição</th>
          <th>Ano</th>
        </tr>
      </thead>
      <tbody id="tabela"></tbody>
    </table>

    <div id="resumoTabela" class="resumo-tabela"></div>

  </div>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
let manutencoes = [];
let unidades = [];
let mapa;
let unidadeSelecionada = "";
let marcadorSelecionado = null;
let marcadores = {};
let limitesMapa = [];
let modoAtual = 'manutencao';
let mapaMunicipios = {};

// 🔥 CARREGAR DADOS
Promise.all([
  fetch('manutencoes.json').then(r => r.json()),
  fetch('unidades.json').then(r => r.json())
])
.then(([m, u]) => {
  manutencoes = m;
  unidades = u;

  carregarFiltros();
  iniciarMapa();
});

// 🔹 EXTRAI MUNICÍPIO
function extrairMunicipio(nome) {
  const partes = nome.split("DE ");

  if (partes.length > 1) {
    return partes[1].split(" -")[0];
  }

  return nome;
}

// 🔹 EXTRAI ANO
function extrairAno(texto) {
  const match = texto.match(/\d{4}/);
  return match ? match[0] : "";
}

// 🔹 FILTROS
function carregarFiltros() {
  const unidadeSelect = document.getElementById('unidadeSelect');
  const anoSelect = document.getElementById('anoSelect');

  const unidadesUnicas = [...new Set(manutencoes.map(d => d.unidade))];

  const anos = [...new Set(
    manutencoes.map(d => extrairAno(d.ano_origem))
  )];

  unidadesUnicas.forEach(u => {
    const opt = document.createElement('option');
    opt.value = u;
    opt.textContent = u;
    unidadeSelect.appendChild(opt);
  });

  anos.forEach(a => {
    if (!a) return;
    const opt = document.createElement('option');
    opt.value = a;
    opt.textContent = a;
    anoSelect.appendChild(opt);
  });
}

// 🔹 EVENTOS
document.getElementById('unidadeSelect').addEventListener('change', () => {

  unidadeSelecionada = document.getElementById('unidadeSelect').value;

  // 👉 SE FOR "TODAS"
  if (!unidadeSelecionada) {

    // limpar seleção
    if (marcadorSelecionado) {
      marcadorSelecionado.setIcon(iconeNormal);
      marcadorSelecionado = null;
    }

    // zoom geral
    if (limitesMapa.length > 0) {
      mapa.fitBounds(limitesMapa, { padding: [50, 50] });
    }

    filtrar();
    return;
  }

  // 👉 SE FOR UMA UNIDADE
  const marker = marcadores[unidadeSelecionada];

  if (marker) {
    const latlng = marker.getLatLng();
    selecionarUnidade(unidadeSelecionada, latlng.lat, latlng.lng, marker);
  } else {
    filtrar();
  }
});

document.getElementById('anoSelect').addEventListener('change', filtrar);

// 🔹 FILTRAR
function filtrar() {
  const ano = document.getElementById('anoSelect').value;

  let lista = [];

  // 👉 ESCOLHE A BASE DE DADOS
  if (modoAtual === 'manutencao') {
    lista = manutencoes;
  }

  // FUTURO:
  // if (modoAtual === 'obras') lista = obras;
  // if (modoAtual === 'residuos') lista = residuos;

  if (unidadeSelecionada) {
    lista = lista.filter(d => d.unidade === unidadeSelecionada);
  }

  if (ano) {
    lista = lista.filter(d => extrairAno(d.ano_origem) === ano);
  }

  renderTabela(lista);
  atualizarResumoTabela(lista);
}

// 🔹 TABELA
function renderTabela(lista) {
  const tabela = document.getElementById('tabela');
  tabela.innerHTML = '';

  lista.forEach(item => {
    tabela.innerHTML += `
      <tr>
        <td>${mapaMunicipios[item.unidade] || '-'}</td>
        <td>${item.data || '-'}</td>
        <td>${item.andar || '-'}</td>
        <td>${item.sala || '-'}</td>
        <td>${item.descricao || '-'}</td>
        <td>${extrairAno(item.ano_origem)}</td>
      </tr>
    `;
  });
}

// 🔥 MAPA

const iconeNormal = L.icon({
  iconUrl: 'https://unpkg.com/leaflet@1.9.4/dist/images/marker-icon.png',
  iconSize: [25, 41],
  iconAnchor: [12, 41]
});

const iconeSelecionado = L.icon({
  iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-red.png',
  iconSize: [25, 41],
  iconAnchor: [12, 41]
});

function selecionarUnidade(unidade, lat, lng, marker) {

  // resetar anterior
  if (marcadorSelecionado) {
    marcadorSelecionado.setIcon(iconeNormal);
  }

  // definir novo
  marcadorSelecionado = marker;
  marker.setIcon(iconeSelecionado);

  // atualizar select
  unidadeSelecionada = unidade;
  document.getElementById('unidadeSelect').value = unidade;

  // zoom no ponto
  mapa.setView([lat, lng], 15);

  // filtrar tabela
  filtrar();
}

function iniciarMapa() {

  mapa = L.map('map');

  limitesMapa = [];

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap'
  }).addTo(mapa);

  unidades.forEach(u => {

    const lat = parseFloat(u.latitude);
    const lng = parseFloat(u.longitude);

    if (isNaN(lat) || isNaN(lng)) return;

    const marker = L.marker([lat, lng], { icon: iconeNormal }).addTo(mapa);

    // salvar referência
    marcadores[u.unidade] = marker;

    marker.on('click', () => {
      selecionarUnidade(u.unidade, lat, lng, marker);
    });

    limitesMapa.push([lat, lng]);

    const municipio = extrairMunicipio(u.unidade);

    marker.bindTooltip(municipio, {
      permanent: true,
      direction: 'right',
      offset: [3, 0],
      opacity: 0.8
    });

    mapaMunicipios[u.unidade] = u.municipio;
  });

  if (limitesMapa.length > 0) {
    mapa.fitBounds(limitesMapa, { padding: [50, 50] });
  } else {
    mapa.setView([-20.5, -54.5], 7);
  }

  atualizarResumoMapa();
}

function mudarModo(modo, botaoClicado) {

  modoAtual = modo;

  // remover ativo de todos
  document.querySelectorAll('.botoes button')
    .forEach(btn => btn.classList.remove('ativo'));

  // ativar o clicado
  botaoClicado.classList.add('ativo');

  filtrar();
}

// 🔹 CLIQUE NO MAPA
function abrirManutencao(unidade) {
  unidadeSelecionada = unidade;
  document.getElementById('unidadeSelect').value = unidade;
  filtrar();
}

function atualizarResumoMapa() {

  // número de unidades (pontos)
  const numeroUnidades = limitesMapa.length;

  // municípios únicos
  const municipios = new Set(
    unidades.map(u => u.municipio)
  );

  const numeroMunicipios = municipios.size;

  // data atual
  const hoje = new Date();
  const dataFormatada = hoje.toLocaleDateString('pt-BR');

  // montar texto
  const texto = `
    A Defensoria possui <b>${numeroUnidades}</b> unidades 
    presentes em <b>${numeroMunicipios}</b> municípios 
    até a data de <b>${dataFormatada}</b>.
  `;

  document.getElementById('resumoMapa').innerHTML = texto;
}

function atualizarResumoTabela(lista) {

  // 📊 TOTAL DE MANUTENÇÕES
  const total = lista.length;

  // 📅 DIAS DE MANUTENÇÃO (datas únicas)
  const diasUnicos = new Set(
    lista.map(item => item.data).filter(Boolean)
  );
  const totalDias = diasUnicos.size;

  // 📆 ÚLTIMA MANUTENÇÃO
  const datasValidas = lista
    .map(item => converterData(item.data, item.ano_origem))
    .filter(d => !isNaN(d));

  let diasSemManutencao = "-";

  if (datasValidas.length > 0) {
    const ultima = new Date(Math.max(...datasValidas));

    const hoje = new Date();

    const diff = Math.floor(
      (hoje - ultima) / (1000 * 60 * 60 * 24)
    );

    diasSemManutencao = diff;
  }

  // 🧾 TEXTO FINAL
  const texto = `
    <b>Total de manutenções:</b> ${total} <br>
    <b>Dias de manutenção:</b> ${totalDias} <br>
    <b>Dias sem manutenção:</b> ${diasSemManutencao}
  `;

  document.getElementById('resumoTabela').innerHTML = texto;
}

function converterData(dataStr, anoStr) {
  if (!dataStr) return null;

  const meses = {
    jan: 0, fev: 1, mar: 2, abr: 3, mai: 4, jun: 5,
    jul: 6, ago: 7, set: 8, out: 9, nov: 10, dez: 11
  };

  const partes = dataStr.toLowerCase().split('-');
  if (partes.length !== 2) return null;

  const dia = parseInt(partes[0]);
  const mes = meses[partes[1]];

  const ano = extrairAno(anoStr) || new Date().getFullYear();

  if (isNaN(dia) || mes === undefined) return null;

  return new Date(ano, mes, dia);
}
</script>

</body>
</html>
